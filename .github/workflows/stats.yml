name: Refresh stats panel

on:
  schedule:
    - cron: "30 0 * * *"   # daily, just after midnight UTC
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - "assets/stats-panel.svg"
      - "assets/heatmap-panel.svg"

permissions:
  contents: write

jobs:
  stats:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate panel
        run: python scripts/generate_stats.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit if changed
        run: |
          git config user.name "madhu12-c"
          git config user.email "mchanda2006@gmail.com"
          git add assets/stats-panel.svg assets/heatmap-panel.svg
          git diff --cached --quiet || git commit -m "refresh stats panel"
          git push
