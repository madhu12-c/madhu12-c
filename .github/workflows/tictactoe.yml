name: Tic-tac-toe move

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: tictactoe
  cancel-in-progress: false

jobs:
  move:
    if: startsWith(github.event.issue.title, 'ttt|')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Play the move
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        run: python scripts/tictactoe.py move "$ISSUE_TITLE" "$ISSUE_AUTHOR"

      - name: Commit board
        run: |
          git config user.name "madhu12-c"
          git config user.email "mchanda2006@gmail.com"
          git add README.md game/state.json
          git diff --cached --quiet || git commit -m "ttt: move by @${{ github.event.issue.user.login }}"
          git pull --rebase origin main
          git push

      - name: Reply and close the issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body-file game/last_message.txt
          gh issue close ${{ github.event.issue.number }} --repo ${{ github.repository }}
